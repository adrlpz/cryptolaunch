# ============================================================
# CryptoLaunch — Docker Compose (Sepolia Testnet)
# ============================================================

services:
  db:
    image: postgres:16-alpine
    container_name: cryptolaunch-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: crypto_launchpad
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: cryptolaunch-app
    restart: unless-stopped
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-changeme}@db:5432/crypto_launchpad?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      SEPOLIA_RPC_URL: ${SEPOLIA_RPC_URL}
      ETH_RPC_URL: ${ETH_RPC_URL:-}
      PLATFORM_WALLET_ADDRESS: ${PLATFORM_WALLET_ADDRESS}
      LAUNCHPAD_FACTORY_ADDRESS: ${LAUNCHPAD_FACTORY_ADDRESS}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CRON_SECRET: ${CRON_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
    driver: local
