# ============================================================
# CryptoLaunch — Coolify Docker Compose
# ============================================================
# Coolify-compatible: no hardcoded ports, uses internal networking.
# Environment variables are set in Coolify UI, not here.
# ============================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: crypto_launchpad
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/crypto_launchpad?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      SEPOLIA_RPC_URL: ${SEPOLIA_RPC_URL}
      PLATFORM_WALLET_ADDRESS: ${PLATFORM_WALLET_ADDRESS}
      LAUNCHPAD_FACTORY_ADDRESS: ${LAUNCHPAD_FACTORY_ADDRESS}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CRON_SECRET: ${CRON_SECRET}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
    driver: local
